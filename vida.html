                  "Ordenar los hechos e intentar enfocarlos para buscar una salida... Hacer una lista de mayor a menor intensidad de lo sucedido.",

              },
              {
                title: "La importancia de la resiliencia",
                content: [
                  "Resiliencia significa resistencia a la adversidad, aprender a soportar situaciones duras y ser capaces de crecerse ante las dificultades y no hundirse.",
                  "La resiliencia es el arte de cambiar el dolor y dotarlo de sentido, la capacidad para ser feliz incluso cuando tienes heridas del alma."
                ]
              }
            ]
          },
          {
            id: "cap10",
            title: "10. La educación de la voluntad",
            synthesis: "La voluntad es la joya de la corona de la conducta. Es la capacidad para aplazar la recompensa inmediata en favor de metas mediatas y valiosas. Un decálogo esencial para fortalecerla.",
            subthemes: [
              {
                title: "1. Aprendizaje gradual",
                content: [
                  "La voluntad necesita un aprendizaje gradual que se consigue con la repetición de actos en donde uno se vence y lucha, cae y se levanta y vuelve a empezar.",
                  "Se trata de ir adquiriendo hábitos positivos. Somos animales de hábitos; los buenos se llaman virtudes y los malos se llaman vicios."
                ]
              },
              {
                title: "2. Empezar por negarse o vencerse",
                content: [
                  "Toda educación de la voluntad tiene un trasfondo ascético: la costumbre de vencerse en lo pequeño.",
                  "El campo de batalla es lo diario, lo menudo, lo que parece trivial... El arte de renunciar a lo cercano buscando un bien lejano."
                ]
              },
              {
                title: "3. La importancia de la motivación",
                content: [
                  "Cualquier avance en la voluntad se hace más fácil si hay motivación. Estar motivado es tener el arco tenso para apuntar al mejor blanco.",
                  "Tener un motivo por el que luchar activa la voluntad y la prepara para actuar."
                ]
              },
              {
                title: "4. Objetivos claros y estables",
                content: [
                  "Es fundamental tener objetivos claros, precisos, bien delimitados, medibles y estables.",
                  "La cabeza no tolera la dispersión. Aprender a renunciar es sabiduría y paz interior. Comenzar es de todos; continuar, de persona perseverante."
                ]
              },
              {
                title: "5. Fondo austero y sobrio",
                content: [
                  "Toda educación de la voluntad tiene un fondo austero, sobrio, especialmente cuando se está comenzando.",
                  "Todo lo mejor emerge lentamente y de manera pequeña. Es vital mostrar modelos de identidad atractivos que empujen a imitarlos."
                ]
              },
              {
                title: "6. Dominio de uno mismo",
                content: [
                  "A medida que uno tiene más voluntad, se gobierna mejor y es más dueño de sí mismo y no se deja llevar por el estímulo inmediato.",
                  "Uno no hace lo que le apetece, ni lo más fácil, sino que se dirige hacia lo mejor. Es la aristocracia de la conducta."
                ]
              },
              {
                title: "7. La necesidad del orden",
                content: [
                  "Una persona con voluntad se da cuenta de lo importante que es el orden. El orden es uno de los mejores amigos de la inteligencia.",
                  "Orden en la forma de pensar, de vivir, de trabajar. Ordenar es tirar lo que sobra y no sirve; esto aporta armonía y paz interior."
                ]
              },
              {
                title: "8. Ser constante y tenaz",
                content: [
                  "Una persona alcanza lo que se ha propuesto si es constante. Esto significa tenacidad, persistencia, no darse por vencido.",
                  "Constancia es saber esperar y saber continuar. Es la mejor fórmula contra la fatiga, teniendo una mirada que apunta a la lejanía."
                ]
              },
              {
                title: "9. Indicador de madurez",
                content: [
                  "Una buena educación de la voluntad es un indicador claro de madurez psicológica.",
                  "Una persona con voluntad llega en la vida más lejos que una inteligente. Quien no la tiene está a merced de sus caprichos."
                ]
              },
              {
                title: "10. Educación interminable",
                content: [
                  "La educación de la voluntad no se termina nunca. El ser humano es siempre una sinfonía inacabada.",
                  "El verdadero objetivo de la voluntad es la victoria sobre uno mismo."
                ]
              }
            ]
          },
          {
            id: "cap11",
            title: "11. Modelos de felicidad",
            synthesis: "La felicidad es un tema interminable y poliédrico. Ha sido analizada desde la antigüedad clásica hasta el pensamiento cristiano y moderno, entendiéndola como plenitud, virtud, satisfacción de deseos o autorrealización.",
            subthemes: [
              {
                title: "La felicidad en el mundo clásico",
                content: [
                  "Para Sócrates la felicidad consistía en conocerse a sí mismo. Para Platón en el amor... Aristóteles dice que la felicidad consiste en el bien.",
                  "Séneca nos da un giro muy interesante. La felicidad consiste en la virtud, que es el hábito de obrar bien... la posesión total y simultánea del bien."
                ]
              },
              {
                title: "La felicidad como autorrealización",
                content: [
                  "La felicidad es un ideal que cualquier ser humano busca, sabiéndolo o sin saberlo, y que a la postre consiste en la mejor realización de uno mismo.",
                  "La felicidad consiste en una vida lograda. Que no es otra cosa que una vida plena... La felicidad es igual a plenitud."
                ]
              }
            ]
          },
          {
            id: "cap12",
            title: "12. Diez consejos para ser feliz",
            synthesis: "La felicidad razonable se basa en una vida lograda y autorrealización. Este decálogo ofrece pautas prácticas para alcanzarla sanando el pasado y teniendo visión de futuro.",
            subthemes: [
              {
                title: "1. Cerrar las heridas del pasado",
                content: [
                  "La felicidad consiste en ser capaz de cerrar las heridas del pasado. Necesitamos reconciliarnos con nuestro pasado. Superar traumas, impactos negativos, reveses, fracasos.",
                  "Vivir instalado en el presente sabiendo sacarle el máximo partido... y, sobre todo, vive empapado de futuro."
                ]
              },
              {
                title: "2. Tener una visión positiva de la vida",
                content: [
                  "Aprender a tener una visión positiva de la vida... El optimismo es una forma positiva de captar la realidad. Y eso requiere una educación de la mirada.",
                  "Descubrir la dimensión más positiva de la realidad, ese segmento que se esconde en el fondo de los hechos y que tiene unas notas positivas."
                ]
              },
              {
                title: "3. Tener una voluntad de hierro",
                content: [
                  "Fuerte, compacta, recia, robusta, resistente al desaliento... Tener una voluntad firme es uno de los más claros indicadores de madurez de la personalidad.",
                  "Toda educación empieza y termina por la voluntad. Sirve nada más y nada menos que para conseguir el adecuado desarrollo del proyecto personal."
                ]
              },
              {
                title: "4. Buen equilibrio entre corazón y cabeza",
                content: [
                  "Los dos grandes componentes de nuestra psicología son el mundo de la afectividad y el de la inteligencia... La clave está en buscar una buena armonía entre ellas.",
                  "Tener una afectividad sana significa mover bien los hilos de las relaciones con los demás... Y a la vez saber utilizar bien los instrumentos de la razón."
                ]
              },
              {
                title: "5. Proyecto de vida coherente y realista",
                content: [
                  "Para ser feliz es necesario tener un proyecto de vida... y este debe albergar en su seno cuatro grandes argumentos: amor, trabajo, cultura y amistad.",
                  "Debe ser coherente, lo que significa tener en su interior el menor número de contradicciones posibles... y realista: tener los pies en la tierra."
                ]
              },
              {
                title: "6. Hacer felices a los demás",
                content: [
                  "Poner los medios adecuados para hacer felices a otras personas. Cuando uno está intentando hacer esto se olvida de sí mismo, olvida sus problemas.",
                  "Hay más alegría en dar que en recibir... Cambiar el foco de atención y volcarnos con los demás intentando darles alegría es de una gran eficacia."
                ]
              },
              {
                title: "7. Apreciar las pequeñas alegrías",
                content: [
                  "Capacidad para apreciar las pequeñas alegrías y placeres de la vida ordinaria... Se trata de saber parar el reloj y detener el tiempo que corre fugaz.",
                  "Hay una felicidad pequeña, que aspira solo a saber disfrutar de lo menudo, de lo cotidiano, que va desde un paisaje bonito a una excursión... o la lectura de un libro."
                ]
              },
              {
                title: "8. Valorar lo que uno tiene",
                content: [
                  "Saber valorar las cosas que uno tiene y las que uno ha conseguido. Nos pasamos la vida pensando en el día de mañana, embebidos de futuro.",
                  "Lo importante no es haber conseguido ciertas metas (que lo es), sino reconocerlo, apreciarlo, evaluarlo, reconocer que detrás de ello ha habido lucha."
                ]
              },
              {
                title: "9. Dar a las cosas la importancia real",
                content: [
                  "Saber darle a las cosas que nos pasan la importancia que realmente tienen... Ser capaz de tener una especie de justeza de juicio.",
                  "Aprender a quitarle importancia a muchas cosas que nos suceden, evitando caer en la tristeza... y tener una buena perspectiva de la vida personal."
                ]
              },
              {
                title: "10. No equivocarse en las expectativas",
                content: [
                  "Saber poner freno a ambiciones excesivas. No pedirle a la vida demasiado, saber que la existencia humana siempre tiene limitaciones.",
                  "La felicidad a la que debemos aspirar es a una felicidad razonable, que yo la resumiría en esta ecuación: logros / expectativas."
                ]
              }
            ]
          },
          {
            id: "cap13",
            title: "13. Características de un líder",
            synthesis: "El verdadero líder no es un ídolo, sino una autoridad moral que arrastra mediante la ejemplaridad, la coherencia de vida y el entusiasmo contagioso, a través de 7 características esenciales.",
            subthemes: [
              {
                title: "1. Personalidad atrayente",
                content: [
                  "Toda personalidad tiene una capacidad de seducción: una mezcla de hechizo, carisma, admiración, cordialidad, que nos arrastra y empuja.",
                  "Es un imán que nos atrae y convence con sus ideales. Las palabras mueven, el líder arrastra."
                ]
              },
              {
                title: "2. Coherencia",
                content: [
                  "Existe una buena proporción, un equilibrio, una conformidad entre el pensamiento y la realidad. Uno es lo que hace, no lo que dice.",
                  "Liderar es servir. Es alguien auténtico, en quien se puede confiar, que no busca el aplauso ni el consenso."
                ]
              },
              {
                title: "3. Equilibrio entre corazón y cabeza",
                content: [
                  "Buen equilibrio entre los sentimientos y los instrumentos de la razón. Sabe ser afectivo y, a la vez, manejar bien la lógica y el juicio.",
                  "Si es un líder de altura, llega a tener la sencillez de los sabios. Es la síntesis de lo esencial."
                ]
              },
              {
                title: "4. Autoridad",
                content: [
                  "Autoridad significa aquel que te hace crecer como persona. Que tira de ti hacia arriba, tratando de sacar lo mejor que llevas dentro.",
                  "Es señorío, prestigio, ser escuchado y observado para aprender. El que solo tiene poder manda, pero no gobierna."
                ]
              },
              {
                title: "5. Capacidad para contagiar entusiasmo",
                content: [
                  "Su mirada aletea por encima de las dificultades y conflictos y sabe dar una visión optimista. Hay pocas cosas tan contagiosas como el entusiasmo.",
                  "El líder es una persona admirada en quien la gente confía, con capacidad de convocatoria y fuerza para ilusionar."
                ]
              },
              {
                title: "6. Mostrar en público sus creencias",
                content: [
                  "Tiene el coraje de expresar lo que lleva dentro, huyendo de lo políticamente correcto, aun a costa de caer mal.",
                  "El líder es escrutado por la gente, pero su solidez le permite manifestar sus convicciones con autenticidad."
                ]
              },
              {
                title: "7. Modelo de identidad",
                content: [
                  "A la gente que sigue sus pasos le gustaría parecerse a él. El verdadero líder te ayuda a ser mejor y a sacar lo mejor de tu persona.",
                  "Nuestra sociedad necesita más testigos que maestros; vidas verdaderas más que gentes que explican teorías."
                ]
              }
            ]
          }
        ];

        function InteractiveDashboard() {
          const [activeChapterId, setActiveChapterId] = useState(bookData[0].id);
          const [searchQuery, setSearchQuery] = useState('');
          const [isSidebarOpen, setIsSidebarOpen] = useState(false);

          const activeChapter = useMemo(() => 
            bookData.find(ch => ch.id === activeChapterId) || bookData[0],
            [activeChapterId]
          );

          // Lógica de búsqueda
          const filteredSubthemes = useMemo(() => {
            if (!searchQuery.trim()) {
              return activeChapter.subthemes.map((subtheme, subIdx) => ({
                id: `sub-${subIdx}`,
                title: subtheme.title,
                content: subtheme.content.map((text, textIdx) => ({ id: `text-${subIdx}-${textIdx}`, text, isMatch: true }))
              }));
            }

            const lowerQuery = searchQuery.toLowerCase();
            
            return activeChapter.subthemes
              .map((subtheme, subIdx) => {
                const matchingContent = subtheme.content
                  .map((text, textIdx) => ({
                    id: `text-${subIdx}-${textIdx}`,
                    text,
                    isMatch: text.toLowerCase().includes(lowerQuery)
                  }))
                  .filter(item => item.isMatch);

                return {
                  id: `sub-${subIdx}`,
                  title: subtheme.title,
                  content: matchingContent
                };
              })
              .filter(subtheme => subtheme.content.length > 0);

          }, [activeChapter, searchQuery]);

          // Función para resaltar el texto buscado
          const highlightText = (text, highlight) => {
            if (!highlight.trim()) return text;
            const parts = text.split(new RegExp(`(${highlight})`, 'gi'));
            return (
              <span>
                {parts.map((part, i) => 
                  part.toLowerCase() === highlight.toLowerCase() ? 
                    <mark key={i} className="bg-yellow-300 text-teal-900 rounded-sm px-0.5 font-medium shadow-sm">{part}</mark> : 
                    part
                )}
              </span>
            );
          };

          return (
            <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden selection:bg-teal-200">
              
              {/* Overlay móvil */}
              {isSidebarOpen && (
                <div 
                  className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-20 md:hidden transition-opacity"
                  onClick={() => setIsSidebarOpen(false)}
                />
              )}

              {/* Sidebar */}
              <aside className={`
                fixed md:static inset-y-0 left-0 z-30 w-80 bg-white border-r border-slate-200 shadow-2xl md:shadow-none
                transform transition-transform duration-300 ease-in-out flex flex-col
                ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}
              `}>
                <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-white relative overflow-hidden">
                  <div className="absolute top-0 right-0 -mt-2 -mr-2 text-teal-50 opacity-60 transform rotate-12">
                     <IconCompass size={110} />
                  </div>
                  <div className="relative z-10">
                    <h1 className="text-xl font-extrabold text-slate-900 tracking-tight leading-tight">Todo lo que tienes que<br/><span className="text-teal-600 uppercase tracking-widest text-2xl">Saber sobre la vida</span></h1>
                    <p className="text-sm font-medium text-slate-500 mt-2 flex items-center gap-1"><IconBookOpen size={14} className="text-teal-400"/> Enrique Rojas</p>
                  </div>
                  <button onClick={() => setIsSidebarOpen(false)} className="md:hidden relative z-10 text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-full">
                    <IconX size={20} />
                  </button>
                </div>

                <nav className="flex-1 overflow-y-auto py-4 custom-scrollbar">
                  <ul className="space-y-1 px-3">
                    {bookData.map((chapter) => (
                      <li key={chapter.id}>
                        <button
                          onClick={() => {
                            setActiveChapterId(chapter.id);
                            setSearchQuery(''); 
                            setIsSidebarOpen(false);
                          }}
                          className={`
                            w-full text-left px-4 py-3 rounded-xl flex items-start gap-3 transition-all duration-200
                            ${activeChapterId === chapter.id 
                              ? 'bg-teal-600 text-white shadow-md shadow-teal-200' 
                              : 'text-slate-600 hover:bg-teal-50 hover:text-teal-900'
                            }
                          `}
                        >
                          <div className={`mt-0.5 flex-shrink-0 ${activeChapterId === chapter.id ? 'text-teal-200' : 'text-teal-500'}`}>
                             <IconBookOpen size={18} />
                          </div>
                          <span className="text-sm font-medium leading-snug">{chapter.title}</span>
                        </button>
                      </li>
                    ))}
                  </ul>
                </nav>
              </aside>

              {/* Contenido principal */}
              <main className="flex-1 flex flex-col h-full overflow-hidden relative bg-slate-50/50">
                
                {/* Header de búsqueda */}
                <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-4 sm:px-8 flex items-center gap-4 sticky top-0 z-10">
                  <button 
                    onClick={() => setIsSidebarOpen(true)}
                    className="md:hidden p-2 -ml-2 text-slate-600 hover:bg-slate-100 rounded-lg transition-colors"
                  >
                    <IconMenu size={24} />
                  </button>

                  <div className="flex-1 max-w-2xl relative group">
                    <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                      <IconSearch size={20} className="text-slate-400 group-focus-within:text-teal-600 transition-colors" />
                    </div>
                    <input
                      type="text"
                      placeholder={`Buscar en "${activeChapter.title}"...`}
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="block w-full pl-11 pr-10 py-3 border border-slate-300 rounded-xl leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-4 focus:ring-teal-500/10 focus:border-teal-500 sm:text-sm transition-all shadow-sm"
                    />
                    {searchQuery && (
                      <button 
                        onClick={() => setSearchQuery('')}
                        className="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-700"
                      >
                        <div className="bg-slate-200 rounded-full p-1">
                          <IconX size={14} />
                        </div>
                      </button>
                    )}
                  </div>
                </header>

                {/* Zona de lectura */}
                <div className="flex-1 overflow-y-auto p-4 sm:p-8 md:p-12 scroll-smooth">
                  <div className="max-w-3xl mx-auto pb-20">
                    
                    <div className="mb-6 flex items-center gap-2 text-xs uppercase tracking-wider text-teal-600 font-bold">
                      <span>Estudio del Libro</span>
                      <IconChevronRight size={14} className="text-slate-400" />
                      <span className="text-slate-500">Lección seleccionada</span>
                    </div>

                    <h2 className="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-8 tracking-tight leading-tight">
                      {activeChapter.title}
                    </h2>

                    {!searchQuery && (
                      <div className="bg-gradient-to-br from-teal-50 to-emerald-50/40 rounded-2xl p-6 sm:p-8 border border-teal-100/80 shadow-sm mb-12 relative overflow-hidden">
                        <div className="absolute top-0 right-0 -mt-4 -mr-4 text-teal-100 opacity-60 transform rotate-12">
                          <IconLightbulb size={120} />
                        </div>
                        <div className="relative z-10">
                          <div className="flex items-center gap-2 mb-4 text-teal-800">
                            <IconLightbulb size={20} />
                            <h3 className="font-bold text-lg">Síntesis de la Lección</h3>
                          </div>
                          <p className="text-slate-700 text-lg leading-relaxed font-medium">
                            {activeChapter.synthesis}
                          </p>
                        </div>
                      </div>
                    )}

                    {searchQuery && (
                      <div className="flex items-center gap-2 mb-6 text-slate-800">
                        <IconSearch size={20} className="text-teal-500" />
                        <h3 className="font-bold text-xl">
                          Resultados de la Búsqueda
                        </h3>
                      </div>
                    )}

                    <div className="space-y-12">
                      {filteredSubthemes.length > 0 ? (
                        filteredSubthemes.map((subtheme) => (
                          <div key={subtheme.id} className="scroll-mt-8">
                            <div className="flex items-center gap-3 mb-6">
                              <div className="bg-teal-100 p-2 rounded-lg shadow-sm">
                                <IconHash size={20} className="text-teal-600" />
                              </div>
                              <h4 className="text-xl font-bold text-slate-800 leading-tight">
                                {subtheme.title}
                              </h4>
                            </div>

                            <div className="space-y-4 pl-4 sm:pl-10">
                              {subtheme.content.map((paragraph) => (
                                <div key={paragraph.id} className="group flex gap-4 p-5 rounded-2xl bg-white border border-slate-200 shadow-sm hover:shadow-md hover:border-teal-300 transition-all relative overflow-hidden">
                                  <div className="absolute left-0 top-0 bottom-0 w-1 bg-slate-200 group-hover:bg-teal-400 transition-colors"></div>
                                  <div className="mt-1 flex-shrink-0 text-slate-200 group-hover:text-teal-200 transition-colors">
                                    <IconQuote size={24} />
                                  </div>
                                  <p className="text-lg text-slate-700 leading-relaxed font-serif">
                                    "{highlightText(paragraph.text, searchQuery)}"
                                  </p>
                                </div>
                              ))}
                            </div>
                          </div>
                        ))
                      ) : (
                        <div className="text-center py-20 px-6 bg-white border border-slate-200 border-dashed rounded-3xl mt-8">
                          <div className="bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <IconSearch size={28} className="text-slate-400" />
                          </div>
                          <h3 className="text-lg font-bold text-slate-900 mb-2">Sin coincidencias textuales</h3>
                          <p className="text-slate-500 max-w-md mx-auto">
                            No se encontraron citas que contengan la frase "<span className="font-medium text-slate-800">{searchQuery}</span>" en esta lección.
                          </p>
                          <button 
                            onClick={() => setSearchQuery('')}
                            className="mt-6 px-4 py-2 bg-teal-50 text-teal-700 hover:bg-teal-100 hover:shadow-sm rounded-lg font-medium transition-all"
                          >
                            Mostrar todo el contenido
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>
              </main>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InteractiveDashboard />);
    </script>
</body>
</html>
