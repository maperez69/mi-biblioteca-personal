<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mi Biblioteca Personal</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0b1121">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { background-color: #0b1121; }
        .card-bg { background-color: #161f33; border: 1px solid #222f4a; }
        .nav-bg { background-color: #0b1121; border-top: 1px solid #222f4a; }
    </style>
</head>
<body class="text-slate-100 min-h-screen flex flex-col font-sans pb-20">

    <!-- Top Header -->
    <header class="p-6 flex justify-between items-start">
        <div>
            <p class="text-[10px] text-slate-400 font-bold tracking-widest uppercase mb-1">Colección Personal</p>
            <h1 class="text-3xl font-extrabold text-white tracking-tight">Mi Biblioteca</h1>
        </div>
        <!-- Botón de Perfil con alerta -->
        <button onclick="mostrarAlerta()" class="w-10 h-10 rounded-full border border-slate-600 flex items-center justify-center text-slate-400 hover:bg-slate-800 transition-colors">
            <i data-lucide="user" class="w-5 h-5"></i>
        </button>
    </header>

    <!-- Main Content -->
    <main class="px-6">
        <!-- Section Title -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-bold text-white">Libros de Estudio</h2>
            <span class="bg-slate-800 text-slate-300 px-3 py-1 rounded-full text-xs font-medium">3 libros</span>
        </div>

        <!-- Lista de 3 Libros separados -->
        <div class="space-y-4">

            <!-- Libro 1: Todo lo que tienes que saber sobre la vida -->
            <a href="vida.html" class="card-bg rounded-2xl p-4 flex items-center justify-between shadow-lg active:scale-95 transition-transform block">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-16 bg-teal-700/90 rounded-lg flex items-center justify-center flex-shrink-0">
                        <span class="text-2xl font-serif font-bold text-white">E</span>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-teal-400 uppercase tracking-wide mb-1">Enrique Rojas</p>
                        <h3 class="text-base font-bold text-white leading-tight mb-2">Todo lo que tienes que saber sobre la vida</h3>
                        <div class="flex items-center text-slate-400 text-xs">
                            <i data-lucide="calendar" class="w-3 h-3 mr-1.5"></i> 13 Lecciones
                        </div>
                    </div>
                </div>
                <i data-lucide="chevron-right" class="text-slate-500 w-5 h-5"></i>
            </a>

            <!-- Libro 2: La Belleza de Vivir -->
            <a href="belleza.html" class="card-bg rounded-2xl p-4 flex items-center justify-between shadow-lg active:scale-95 transition-transform block">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-16 bg-blue-600/90 rounded-lg flex items-center justify-center flex-shrink-0">
                        <i data-lucide="book" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-blue-400 uppercase tracking-wide mb-1">Luis Gutiérrez Rojas</p>
                        <h3 class="text-base font-bold text-white leading-tight mb-2">La Belleza de Vivir</h3>
                        <div class="flex items-center text-slate-400 text-xs">
                            <i data-lucide="calendar" class="w-3 h-3 mr-1.5"></i> 10 Capítulos
                        </div>
                    </div>
                </div>
                <i data-lucide="chevron-right" class="text-slate-500 w-5 h-5"></i>
            </a>

            <!-- Libro 3: Vivir Más Libre -->
            <a href="libre.html" class="card-bg rounded-2xl p-4 flex items-center justify-between shadow-lg active:scale-95 transition-transform block">
                <div class="flex items-center gap-4">
                    <div class="w-14 h-16 bg-indigo-600/90 rounded-lg flex items-center justify-center flex-shrink-0">
                        <i data-lucide="book-open" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-wide mb-1">Luis Gutiérrez Rojas</p>
                        <h3 class="text-base font-bold text-white leading-tight mb-2">Vivir Más Libre</h3>
                        <div class="flex items-center text-slate-400 text-xs">
                            <i data-lucide="calendar" class="w-3 h-3 mr-1.5"></i> 10 Capítulos
                        </div>
                    </div>
                </div>
                <i data-lucide="chevron-right" class="text-slate-500 w-5 h-5"></i>
            </a>

        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="nav-bg fixed bottom-0 w-full px-6 py-3 pb-8 flex justify-between items-center">
        <!-- Inicio (Activo) -->
        <a href="index.html" class="flex flex-col items-center text-teal-400 w-1/3">
            <i data-lucide="home" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px] font-medium">Inicio</span>
        </a>
        
        <!-- Buscar (Inactivo - Muestra alerta) -->
        <button onclick="mostrarAlerta()" class="flex flex-col items-center text-slate-500 w-1/3 hover:text-slate-400 transition-colors">
            <i data-lucide="search" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px] font-medium">Buscar</span>
        </button>
        
        <!-- Etiquetas (Inactivo - Muestra alerta) -->
        <button onclick="mostrarAlerta()" class="flex flex-col items-center text-slate-500 w-1/3 hover:text-slate-400 transition-colors">
            <i data-lucide="tag" class="w-6 h-6 mb-1"></i>
            <span class="text-[10px] font-medium">Etiquetas</span>
        </button>
    </nav>

    <script>
        // Inicializar los íconos
        lucide.createIcons();

        // Función para los botones inactivos
        function mostrarAlerta() {
            alert("¡Hola! Esta función requiere una base de datos y estará disponible en una versión futura de la aplicación.");
        }
    </script>
</body>
</html>
