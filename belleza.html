                  "El plan perfecto sería tener una idea clara, ambiciosa y de fondo... A sabiendas de que alcanzar cualquiera de esas metas no nos aportará la felicidad total.",
                  "El futuro no depende de lo que hagas... Todo parece ser cuestión de suerte... Nada más alejado de la realidad."
                ]
              },
              {
                title: "El hombre feliz exprime sus talentos y sabe a quién pegarse",
                content: [
                  "Para acertar hay que confiar en los demás, hay que decir que no a lo que nos esclaviza y decir que sí a los que nos rodean.",
                  "Para innovar y para crecer debemos rodearnos de los mejores. El hombre feliz no es envidioso... Se apoya y se aprovecha del talento ajeno."
                ]
              },
              {
                title: "Saber elegir lo que uno quiere",
                content: [
                  "Debemos aprender a purificar nuestros deseos. Y no hay nada superior que buscar la verdad y hacer el bien.",
                  "El hombre feliz pone sumo cuidado en elegir lo mejor... Pondrá su vista en metas altas, amplias y ambiciosas."
                ]
              },
              {
                title: "La felicidad no tiene nada que ver con el talento",
                content: [
                  "El hombre feliz no tiene muchos talentos. A veces no tiene ninguno. Precisamente es feliz por ello. No tiene que demostrarle nada a nadie.",
                  "La persona feliz se acepta tal y como es... Aceptaré mis limitaciones como parte de mi sello personal."
                ]
              },
              {
                title: "Diferencias entre la resignación y la aceptación",
                content: [
                  "La resignación promueve la indefensión pues no nos deja aprender de nuestros errores.",
                  "El hombre feliz acepta las cosas. No se resigna... Aceptar la realidad es creer que yo soy uno de los principales protagonistas de mi vida."
                ]
              },
              {
                title: "Las personas felices huyen del perfeccionismo",
                content: [
                  "El perfeccionista no disfruta nunca del resultado... y amarga la vida a los demás pues suele exigirles el mismo grado de absurda perfección.",
                  "Las personas felices nunca olvidan sus malas decisiones, pero no para regodearse obsesivamente sobre ellas, sino para aprender de sus errores."
                ]
              },
              {
                title: "El peligro de la planificación",
                content: [
                  "El hombre actual teme mucho la equivocación y para evitar cometer un error evita pronunciarse.",
                  "La vida es una sucesión eterna de decisiones parciales... Solo el que no se arriesga es el que nunca acierta."
                ]
              }
            ]
          },
          {
            id: "cap9",
            title: "9. Decálogo del bienestar",
            synthesis: "Un resumen práctico: rechazar las mentiras del consumismo, evitar el optimismo tóxico (aceptando que la vida duele), entender que el amor exige sacrificio, controlar los pensamientos irracionales y destinar nuestro tiempo a lo importante.",
            subthemes: [
              {
                title: "No es bueno dar consejos",
                content: [
                  "Las personas maduras y adultas toman sus propias decisiones, asumen que muchas de estas serán equivocadas y asumen las consecuencias."
                ]
              },
              {
                title: "1ª Idea: Muchas de las cosas que creemos no son verdad",
                content: [
                  "La verdadera felicidad está en el ser y no en el tener. Ninguna cosa material... podrá superar o sustituir la satisfacción que genera el crecimiento personal."
                ]
              },
              {
                title: "2ª Idea: Evitemos caer en las trampas del positivismo",
                content: [
                  "La mejor manera de afrontar la dureza de la vida es ser conscientes de que esta forma parte de ella.",
                  "El perfeccionismo tiende a esconder toda la basura debajo de la alfombra. El hombre maduro no tiene miedo a mirar cara a cara a su miseria."
                ]
              },
              {
                title: "3ª Idea: El amor es el único remedio",
                content: [
                  "El amor no es racional, no es medible ni comprensible. El amor nos da un plus de inteligencia.",
                  "Toda amor conlleva una negación... No hay otra opción, o nosotros o los demás."
                ]
              },
              {
                title: "4ª Idea: Dejar de tenerle miedo al dolor",
                content: [
                  "El miedo al dolor (más que el dolor mismo) es una de las principales fuentes de infelicidad."
                ]
              },
              {
                title: "5ª Idea: Respetar la jerarquía del amor",
                content: [
                  "El amor es ordenado, es decir, jerárquico... El casado casa quiere. Quien no busca por encima de todas las cosas la felicidad de su cónyuge no sabe nada de la esencia del matrimonio."
                ]
              },
              {
                title: "6ª Idea: Al hombre feliz no le importa no serlo",
                content: [
                  "Liberémonos para siempre de la obligación de ser felices para siempre.",
                  "El hombre feliz sale de sí mismo y se preocupa por el otro. Alcanza más felicidad cuando consuela a otro que cuando alcanza sus metas."
                ]
              },
              {
                title: "7ª Idea: El hombre feliz hace lo que le da la gana en todo momento",
                content: [
                  "El hombre libre no es el que hace lo que le da la gana, sino el que hace el bien porque le da la gana."
                ]
              },
              {
                title: "8ª Idea: El hombre maduro sabe a dónde va, pero le da igual el camino",
                content: [
                  "No hacer nada puede ser la peor y la más terrible de las decisiones.",
                  "La vida es un laberinto infinito de decisiones constantes. Un lugar en el que el que no se moja nunca consigue nada."
                ]
              },
              {
                title: "9ª Idea: El hombre feliz tiene cuidado con lo que piensa",
                content: [
                  "Lo peligroso, amenazante, depresivo y preocupante no es lo que nos pasa, sino lo que creemos que nos pasa. O mejor, lo que tememos que nos vaya a pasar."
                ]
              },
              {
                title: "10ª Idea: Aprender a poner lo importante por encima de lo superfluo",
                content: [
                  "El hombre feliz hace lo que tiene que hacer. Es ordenado y jerarquiza sus acciones... Paradójicamente, haciendo muchas más cosas... tiene mucho más tiempo libre."
                ]
              }
            ]
          },
          {
            id: "cap10",
            title: "10. El sentido de la felicidad, no apto para incrédulos",
            synthesis: "La vida encierra un misterio y un anhelo de eternidad que la materia no puede saciar. El sufrimiento adquiere sentido cuando nos vacuna contra el egoísmo y nos ayuda a comprender el dolor ajeno.",
            subthemes: [
              {
                title: "La vida es un misterio, y siempre lo será",
                content: [
                  "El hombre es el único ser vivo que sabe que va a morir. Por eso nos preparamos para morir. Pero el hombre moderno... ha decidido negarla e intentar ganarle la partida al tiempo.",
                  "El sufrimiento innecesario es un sufrimiento absurdo; el sufrimiento necesario es un sufrimiento que tiene sentido."
                ]
              },
              {
                title: "El hombre es un naufragio que busca ser rescatado",
                content: [
                  "El hombre es una criatura insaciable. Ninguna realidad humana le es suficiente.",
                  "El hombre está diseñado para desear ser completado... Está llamado para cambiar el mundo."
                ]
              },
              {
                title: "Para entender el dolor, es necesario padecerlo",
                content: [
                  "Las personas que viven pegadas a su satisfacción diaria, a la búsqueda del placer momentáneo, están incapacitadas para amar.",
                  "La principal ventaja de padecer sufrimiento es que nos vacuna frente a dolores futuros; la segunda, que nos quita el miedo al dolor y la tercera, que nos hace comprensivos frente a los dolores ajenos."
                ]
              },
              {
                title: "Liberarse de la esclavitud del yo",
                content: [
                  "Si matamos nuestro yo, si acabamos con ese tirano imberbe que quiere gobernar nuestra vida... entonces, alcanzaremos la libertad.",
                  "Cuando uno aniquila a su yo... le será mucho más fácil acabar con ellas cuando de nuevo aparezcan."
                ]
              },
              {
                title: "El bien es universal",
                content: [
                  "Para hacer algo trascendente, algo que nos sobreviva, debemos dejar de tenerle miedo al dolor y estar dispuesto a pincharnos en el rosal.",
                  "El bien es universal. Igual que la Verdad y la Belleza. Todas las personas felices lo son por el mismo motivo... Han conseguido liberarse de su yo."
                ]
              }
            ]
          }
        ];

        function InteractiveDashboard() {
          const [activeChapterId, setActiveChapterId] = useState(bookData[0].id);
          const [searchQuery, setSearchQuery] = useState('');
          const [isSidebarOpen, setIsSidebarOpen] = useState(false);

          const activeChapter = useMemo(() => 
            bookData.find(ch => ch.id === activeChapterId) || bookData[0],
            [activeChapterId]
          );

          const filteredSubthemes = useMemo(() => {
            if (!searchQuery.trim()) {
              return activeChapter.subthemes.map((subtheme, subIdx) => ({
                id: `sub-${subIdx}`,
                title: subtheme.title,
                content: subtheme.content.map((text, textIdx) => ({ id: `text-${subIdx}-${textIdx}`, text, isMatch: true }))
              }));
            }

            const lowerQuery = searchQuery.toLowerCase();
            
            return activeChapter.subthemes
              .map((subtheme, subIdx) => {
                const matchingContent = subtheme.content
                  .map((text, textIdx) => ({
                    id: `text-${subIdx}-${textIdx}`,
                    text,
                    isMatch: text.toLowerCase().includes(lowerQuery)
                  }))
                  .filter(item => item.isMatch);

                return {
                  id: `sub-${subIdx}`,
                  title: subtheme.title,
                  content: matchingContent
                };
              })
              .filter(subtheme => subtheme.content.length > 0);

          }, [activeChapter, searchQuery]);

          const highlightText = (text, highlight) => {
            if (!highlight.trim()) return text;
            const parts = text.split(new RegExp(`(${highlight})`, 'gi'));
            return (
              <span>
                {parts.map((part, i) => 
                  part.toLowerCase() === highlight.toLowerCase() ? 
                    <mark key={i} className="bg-yellow-300 text-slate-900 rounded-sm px-0.5 font-medium shadow-sm">{part}</mark> : 
                    part
                )}
              </span>
            );
          };

          return (
            <div className="flex h-screen bg-slate-50 font-sans text-slate-800 overflow-hidden selection:bg-blue-200">
              
              {isSidebarOpen && (
                <div 
                  className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-20 md:hidden transition-opacity"
                  onClick={() => setIsSidebarOpen(false)}
                />
              )}

              <aside className={`
                fixed md:static inset-y-0 left-0 z-30 w-72 bg-white border-r border-slate-200 shadow-2xl md:shadow-none
                transform transition-transform duration-300 ease-in-out flex flex-col
                ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'}
              `}>
                <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-white">
                  <div>
                    <h1 className="text-2xl font-extrabold text-slate-900 tracking-tight leading-tight">La Belleza<br/>de Vivir</h1>
                    <p className="text-sm font-medium text-blue-600 mt-1">Luis Gutiérrez Rojas</p>
                  </div>
                  <button onClick={() => setIsSidebarOpen(false)} className="md:hidden text-slate-400 hover:text-slate-700 bg-slate-50 p-2 rounded-full">
                    <IconX size={20} />
                  </button>
                </div>

                <nav className="flex-1 overflow-y-auto py-4 custom-scrollbar">
                  <ul className="space-y-1 px-3">
                    {bookData.map((chapter) => (
                      <li key={chapter.id}>
                        <button
                          onClick={() => {
                            setActiveChapterId(chapter.id);
                            setSearchQuery(''); 
                            setIsSidebarOpen(false);
                          }}
                          className={`
                            w-full text-left px-4 py-3 rounded-xl flex items-start gap-3 transition-all duration-200
                            ${activeChapterId === chapter.id 
                              ? 'bg-blue-600 text-white shadow-md shadow-blue-200' 
                              : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'
                            }
                          `}
                        >
                          <div className={`mt-0.5 flex-shrink-0 ${activeChapterId === chapter.id ? 'text-blue-200' : 'text-slate-400'}`}>
                             <IconBookOpen size={18} />
                          </div>
                          <span className="text-sm font-medium leading-snug">{chapter.title}</span>
                        </button>
                      </li>
                    ))}
                  </ul>
                </nav>
              </aside>

              <main className="flex-1 flex flex-col h-full overflow-hidden relative bg-slate-50/50">
                
                {/* ENCABEZADO CON BOTÓN DE REGRESO Y BUSCADOR */}
                <header className="bg-white/80 backdrop-blur-md border-b border-slate-200 px-4 py-4 sm:px-8 flex items-center gap-4 sticky top-0 z-10">
                  
                  {/* AQUÍ ESTÁ EL BOTÓN DE REGRESAR AL MENÚ */}
                  <a 
                    href="index.html" 
                    title="Volver a Mi Biblioteca"
                    className="p-2 -ml-2 text-slate-500 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition-colors flex items-center justify-center"
                  >
                    <IconArrowLeft size={24} />
                  </a>

                  <button 
                    onClick={() => setIsSidebarOpen(true)}
                    className="md:hidden p-2 text-slate-600 hover:bg-slate-100 rounded-lg transition-colors"
                  >
                    <IconMenu size={24} />
                  </button>

                  <div className="flex-1 max-w-2xl relative group">
                    <div className="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                      <IconSearch size={20} className="text-slate-400 group-focus-within:text-blue-500 transition-colors" />
                    </div>
                    <input
                      type="text"
                      placeholder={`Buscar en "${activeChapter.title}"...`}
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="block w-full pl-11 pr-10 py-3 border border-slate-300 rounded-xl leading-5 bg-slate-50 placeholder-slate-400 focus:outline-none focus:bg-white focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 sm:text-sm transition-all shadow-sm"
                    />
                    {searchQuery && (
                      <button 
                        onClick={() => setSearchQuery('')}
                        className="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-700"
                      >
                        <div className="bg-slate-200 rounded-full p-1">
                          <IconX size={14} />
                        </div>
                      </button>
                    )}
                  </div>
                </header>

                <div className="flex-1 overflow-y-auto p-4 sm:p-8 md:p-12 scroll-smooth">
                  <div className="max-w-3xl mx-auto pb-20">
                    
                    <div className="mb-6 flex items-center gap-2 text-xs uppercase tracking-wider text-blue-600 font-bold">
                      <span>Estudio del Libro</span>
                      <IconChevronRight size={14} className="text-slate-400" />
                      <span className="text-slate-500">Capítulo seleccionado</span>
                    </div>

                    <h2 className="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-8 tracking-tight leading-tight">
                      {activeChapter.title}
                    </h2>

                    {!searchQuery && (
                      <div className="bg-gradient-to-br from-blue-50 to-indigo-50/30 rounded-2xl p-6 sm:p-8 border border-blue-100/60 shadow-sm mb-12 relative overflow-hidden">
                        <div className="absolute top-0 right-0 -mt-4 -mr-4 text-blue-100 opacity-50 transform rotate-12">
                          <IconLightbulb size={120} />
                        </div>
                        <div className="relative z-10">
                          <div className="flex items-center gap-2 mb-4 text-blue-800">
                            <IconLightbulb size={20} />
                            <h3 className="font-bold text-lg">Síntesis del Capítulo</h3>
                          </div>
                          <p className="text-slate-700 text-lg leading-relaxed font-medium">
                            {activeChapter.synthesis}
                          </p>
                        </div>
                      </div>
                    )}

                    {searchQuery && (
                      <div className="flex items-center gap-2 mb-6 text-slate-800">
                        <IconSearch size={20} className="text-blue-500" />
                        <h3 className="font-bold text-xl">
                          Resultados de la Búsqueda
                        </h3>
                      </div>
                    )}

                    <div className="space-y-12">
                      {filteredSubthemes.length > 0 ? (
                        filteredSubthemes.map((subtheme) => (
                          <div key={subtheme.id} className="scroll-mt-8">
                            <div className="flex items-center gap-3 mb-6">
                              <div className="bg-blue-100 p-2 rounded-lg">
                                <IconHash size={20} className="text-blue-600" />
                              </div>
                              <h4 className="text-xl font-bold text-slate-800 leading-tight">
                                {subtheme.title}
                              </h4>
                            </div>

                            <div className="space-y-4 pl-4 sm:pl-10">
                              {subtheme.content.map((paragraph) => (
                                <div key={paragraph.id} className="group flex gap-4 p-5 rounded-2xl bg-white border border-slate-200 shadow-sm hover:shadow-md hover:border-blue-200 transition-all relative overflow-hidden">
                                  <div className="absolute left-0 top-0 bottom-0 w-1 bg-slate-200 group-hover:bg-blue-400 transition-colors"></div>
                                  <div className="mt-1 flex-shrink-0 text-slate-200 group-hover:text-blue-100 transition-colors">
                                    <IconQuote size={24} />
                                  </div>
                                  <p className="text-lg text-slate-700 leading-relaxed font-serif">
                                    "{highlightText(paragraph.text, searchQuery)}"
                                  </p>
                                </div>
                              ))}
                            </div>
                          </div>
                        ))
                      ) : (
                        <div className="text-center py-20 px-6 bg-white border border-slate-200 border-dashed rounded-3xl mt-8">
                          <div className="bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <IconSearch size={28} className="text-slate-400" />
                          </div>
                          <h3 className="text-lg font-bold text-slate-900 mb-2">Sin coincidencias textuales</h3>
                          <p className="text-slate-500 max-w-md mx-auto">
                            No se encontraron citas que contengan la frase "<span className="font-medium text-slate-800">{searchQuery}</span>" en este capítulo.
                          </p>
                          <button 
                            onClick={() => setSearchQuery('')}
                            className="mt-6 px-4 py-2 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded-lg font-medium transition-colors"
                          >
                            Mostrar todo el contenido
                          </button>
                        </div>
                      )}
                    </div>

                  </div>
                </div>
              </main>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<InteractiveDashboard />);
    </script>
</body>
</html>
